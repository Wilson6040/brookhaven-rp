<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a1a"/>

  <!-- Cat ears (pointy triangles) -->
  <polygon points="140,200 170,100 220,195" fill="#f0f0f0"/>
  <polygon points="155,195 170,120 210,192" fill="#ffb6c1" opacity="0.7"/>
  <polygon points="292,195 342,100 372,200" fill="#f0f0f0"/>
  <polygon points="302,192 342,120 357,195" fill="#ffb6c1" opacity="0.7"/>

  <!-- Head -->
  <ellipse cx="256" cy="270" rx="120" ry="110" fill="#f0f0f0"/>

  <!-- Black patches (classic B&W cat) -->
  <ellipse cx="210" cy="240" rx="45" ry="40" fill="#222"/>
  <ellipse cx="310" cy="235" rx="30" ry="35" fill="#222"/>
  <ellipse cx="256" cy="340" rx="35" ry="25" fill="#ddd"/>

  <!-- Eyes -->
  <!-- Left eye white -->
  <ellipse cx="210" cy="245" rx="22" ry="20" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="310" cy="240" rx="22" ry="20" fill="white"/>
  <!-- Left pupil (slightly crossed / derpy) -->
  <ellipse cx="215" cy="248" rx="11" ry="15" fill="#111"/>
  <!-- Right pupil (other direction — crossed look) -->
  <ellipse cx="305" cy="243" rx="11" ry="15" fill="#111"/>
  <!-- Eye shine dots -->
  <circle cx="220" cy="243" r="4" fill="white"/>
  <circle cx="310" cy="238" r="4" fill="white"/>

  <!-- Nose -->
  <polygon points="256,288 248,300 264,300" fill="#ff9eb5"/>

  <!-- Mouth — goofy grin -->
  <path d="M248,302 Q238,318 228,312" stroke="#555" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M264,302 Q274,318 284,312" stroke="#555" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M248,302 Q256,308 264,302" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="145" y1="285" x2="238" y2="295" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="298" x2="238" y2="300" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="311" x2="238" y2="305" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="274" y1="295" x2="367" y2="285" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="274" y1="300" x2="372" y2="298" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="274" y1="305" x2="364" y2="311" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- Tiny tongue sticking out -->
  <ellipse cx="256" cy="312" rx="10" ry="7" fill="#ff6b8a"/>

  <!-- Blush marks -->
  <ellipse cx="185" cy="310" rx="18" ry="10" fill="#ffb6c1" opacity="0.5"/>
  <ellipse cx="327" cy="310" rx="18" ry="10" fill="#ffb6c1" opacity="0.5"/>
</svg>
