<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brookhaven RP - Phase 1</title>
  <style>
    :root {
      --ui-bg: rgba(14, 22, 28, 0.75);
      --ui-border: rgba(255, 255, 255, 0.2);
      --text: #f4f7fb;
      --accent: #ffd45b;
      --good: #4cd27f;
      --bad: #ff6e6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: #111;
      color: var(--text);
    }

    #gameCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .panel {
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    #hudTopLeft {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #hudTopRight {
      position: absolute;
      top: 12px;
      right: 12px;
      min-width: 130px;
      text-align: right;
    }

    .barWrap {
      width: 100%;
      margin-top: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      transition: width 0.12s linear;
    }

    #staminaBar { background: var(--accent); }
    #healthBar { background: var(--bad); }

    #minimapWrap {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 150px;
      height: 150px;
      padding: 0;
      overflow: hidden;
    }

    #minimapCanvas {
      width: 150px;
      height: 150px;
      display: block;
      border-radius: 10px;
    }

    #hotbar {
      position: absolute;
      left: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: repeat(6, 52px);
      gap: 8px;
      padding: 8px;
    }

    .slot {
      width: 52px;
      height: 52px;
      border: 1px solid var(--ui-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.8);
    }

    #zonePopup {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 8px 14px;
    }

    #interactionPrompt {
      position: absolute;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.2s ease;
      padding: 8px 16px;
      font-size: 14px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 12, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 20;
    }

    .menuCard {
      width: min(92vw, 500px);
      max-height: 90vh;
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menuCard h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .menuRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .menuBtn {
      border: 1px solid var(--ui-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .menuBtn:hover { background: rgba(255, 255, 255, 0.2); }

    .slider {
      width: 170px;
    }

    #mapOverlayContent {
      width: min(92vw, 900px);
      height: min(90vh, 700px);
      position: relative;
      padding: 14px;
    }

    #mapBoard {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      border: 1px solid var(--ui-border);
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px) 0 0 / 48px 48px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px) 0 0 / 48px 48px,
        radial-gradient(circle at 30% 22%, rgba(70, 140, 220, 0.28), transparent 35%),
        linear-gradient(170deg, #12242f, #0f1a21);
      position: relative;
      overflow: hidden;
    }

    .mapLabel {
      position: absolute;
      font-size: 13px;
      color: rgba(245, 251, 255, 0.9);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      user-select: none;
    }

    #mapPlayer {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffdb67;
      border: 2px solid rgba(255, 255, 255, 0.8);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(255, 219, 103, 0.8);
    }

    #mapClock {
      position: absolute;
      right: 14px;
      top: 14px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 700px) {
      #hudTopLeft { width: 200px; }
      #hotbar { grid-template-columns: repeat(6, 44px); gap: 6px; }
      .slot { width: 44px; height: 44px; }
      #interactionPrompt { bottom: 68px; }
      #minimapWrap { width: 130px; height: 130px; }
      #minimapCanvas { width: 130px; height: 130px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="hudTopLeft" class="panel">
      <div>Balance: <strong id="balanceText">$500</strong></div>
      <div>
        Stamina
        <div class="barWrap"><div id="staminaBar" class="bar" style="width:100%"></div></div>
      </div>
      <div>
        Health
        <div class="barWrap"><div id="healthBar" class="bar" style="width:100%"></div></div>
      </div>
    </div>

    <div id="hudTopRight" class="panel">
      <div>Clock: <strong id="clockText">12:00</strong></div>
      <div>Weather: <strong id="weatherText">sunny</strong></div>
    </div>

    <div id="zonePopup" class="panel">Town Centre</div>
    <div id="interactionPrompt" class="panel">Press E</div>

    <div id="hotbar" class="panel">
      <div class="slot">1</div>
      <div class="slot">2</div>
      <div class="slot">3</div>
      <div class="slot">4</div>
      <div class="slot">5</div>
      <div class="slot">6</div>
    </div>

    <div id="minimapWrap" class="panel">
      <canvas id="minimapCanvas" width="150" height="150"></canvas>
    </div>

    <div id="pauseOverlay" class="overlay">
      <div class="menuCard panel">
        <h2>Paused</h2>
        <button id="resumeBtn" class="menuBtn">Resume</button>
        <div class="panel">Controls: WASD move, Shift run, Space jump, E emote, F sit, V first-person, M map, Esc pause</div>
        <div class="panel">
          <div style="margin-bottom:8px;font-weight:600">Settings</div>
          <div class="menuRow">
            <label for="musicVolume">Music</label>
            <input id="musicVolume" class="slider" type="range" min="0" max="1" step="0.01" value="0.35" />
          </div>
          <div class="menuRow">
            <label for="sfxVolume">SFX</label>
            <input id="sfxVolume" class="slider" type="range" min="0" max="1" step="0.01" value="0.8" />
          </div>
        </div>
        <div class="menuRow">
          <button id="saveBtn" class="menuBtn">Save</button>
          <button id="loadBtn" class="menuBtn">Load</button>
          <button id="quitBtn" class="menuBtn">Quit</button>
        </div>
      </div>
    </div>

    <div id="mapOverlay" class="overlay">
      <div id="mapOverlayContent" class="panel">
        <div id="mapBoard">
          <div id="mapClock">00:00</div>
          <div id="mapPlayer"></div>
          <div class="mapLabel" style="left: 10%; top: 12%;">Residential</div>
          <div class="mapLabel" style="left: 43%; top: 40%;">High Street</div>
          <div class="mapLabel" style="left: 62%; top: 26%;">Civic</div>
          <div class="mapLabel" style="left: 74%; top: 66%;">Park</div>
          <div class="mapLabel" style="left: 41%; top: 77%;">Beach</div>
          <div class="mapLabel" style="left: 7%; top: 2%;">Farm</div>
          <div class="mapLabel" style="left: 42%; top: 8%;">Forest</div>
          <div class="mapLabel" style="left: 8%; top: 58%;">Carnival</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x8fc8ff);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("gameCanvas"), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const miniRenderer = new THREE.WebGLRenderer({
      canvas: document.getElementById("minimapCanvas"),
      antialias: true,
      alpha: true
    });
    miniRenderer.setSize(150, 150, false);
    miniRenderer.setPixelRatio(1);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1500);
    const miniCamera = new THREE.OrthographicCamera(-120, 120, 120, -120, 1, 600);

    const clock = new THREE.Clock();

    const balanceText = document.getElementById("balanceText");
    const staminaBar = document.getElementById("staminaBar");
    const healthBar = document.getElementById("healthBar");
    const clockText = document.getElementById("clockText");
    const weatherText = document.getElementById("weatherText");
    const zonePopup = document.getElementById("zonePopup");
    const interactionPrompt = document.getElementById("interactionPrompt");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const mapOverlay = document.getElementById("mapOverlay");
    const mapPlayer = document.getElementById("mapPlayer");
    const mapClock = document.getElementById("mapClock");

    const state = {
      paused: false,
      mapOpen: false,
      firstPerson: false,
      balance: 500,
      health: 100,
      stamina: 100,
      inventory: [null, null, null, null, null, null],
      timeOfDay: 0.25,
      weather: "sunny",
      weatherTimer: 0,
      weatherDuration: randomWeatherSeconds(),
      zoneName: "Town Centre",
      zonePopupTimer: 0,
      emoteIndex: 0,
      sitting: false,
      swimMode: false,
      rainPositions: [],
      snowPositions: [],
      mapBlink: 0
    };

    const keys = {};
    const collisionObjects = [];
    const collisionBoxes = [];
    const benches = [];
    const houseWindows = [];
    const streetlamps = [];

    const playerConfig = {
      skinColor: 0xf2c8a0,
      shirtColor: 0x4da6ff,
      trouserColor: 0x2f3953,
      shoeColor: 0x232323,
      hairColor: 0x2a1b12,
      hairStyle: "short"
    };

    const player = new THREE.Group();
    player.position.set(0, 1, 0);
    scene.add(player);

    const torso = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.45, 1.2, 14),
      new THREE.MeshStandardMaterial({ color: playerConfig.shirtColor })
    );
    torso.position.y = 0.95;
    torso.castShadow = true;
    player.add(torso);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 16, 16),
      new THREE.MeshStandardMaterial({ color: playerConfig.skinColor })
    );
    head.position.y = 1.78;
    head.castShadow = true;
    player.add(head);

    const leftLeg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.13, 0.14, 0.72, 10),
      new THREE.MeshStandardMaterial({ color: playerConfig.trouserColor })
    );
    leftLeg.position.set(-0.13, 0.35, 0);
    leftLeg.castShadow = true;
    player.add(leftLeg);

    const rightLeg = leftLeg.clone();
    rightLeg.position.x = 0.13;
    player.add(rightLeg);

    const leftShoe = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.08, 0.26),
      new THREE.MeshStandardMaterial({ color: playerConfig.shoeColor })
    );
    leftShoe.position.set(-0.13, 0.02, 0.04);
    leftShoe.castShadow = true;
    player.add(leftShoe);

    const rightShoe = leftShoe.clone();
    rightShoe.position.x = 0.13;
    player.add(rightShoe);

    const leftArmPivot = new THREE.Group();
    leftArmPivot.position.set(-0.44, 1.4, 0);
    const leftArm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.09, 0.76, 10),
      new THREE.MeshStandardMaterial({ color: playerConfig.skinColor })
    );
    leftArm.position.y = -0.36;
    leftArm.castShadow = true;
    leftArmPivot.add(leftArm);
    player.add(leftArmPivot);

    const rightArmPivot = new THREE.Group();
    rightArmPivot.position.set(0.44, 1.4, 0);
    const rightArm = leftArm.clone();
    rightArmPivot.add(rightArm);
    player.add(rightArmPivot);

    let hairMesh = null;
    function applyHairStyle(style) {
      if (hairMesh) head.remove(hairMesh);
      const hairMat = new THREE.MeshStandardMaterial({ color: playerConfig.hairColor });
      const g = new THREE.Group();

      if (style === "bob") {
        const top = new THREE.Mesh(new THREE.SphereGeometry(0.31, 14, 14), hairMat);
        top.position.y = 0.04;
        const fringe = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.14, 12), hairMat);
        fringe.position.y = -0.16;
        g.add(top, fringe);
      } else if (style === "short") {
        const flat = new THREE.Mesh(new THREE.CylinderGeometry(0.285, 0.285, 0.13, 14), hairMat);
        flat.position.y = 0.11;
        g.add(flat);
      } else if (style === "afro") {
        const afro = new THREE.Mesh(new THREE.SphereGeometry(0.37, 14, 14), hairMat);
        afro.position.y = 0.13;
        g.add(afro);
      } else if (style === "bun") {
        const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.12, 14), hairMat);
        cap.position.y = 0.08;
        const bun = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), hairMat);
        bun.position.y = 0.36;
        g.add(cap, bun);
      } else if (style === "buzz") {
        const buzz = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.05, 12), hairMat);
        buzz.position.y = 0.17;
        g.add(buzz);
      }

      hairMesh = g;
      head.add(hairMesh);
    }
    applyHairStyle(playerConfig.hairStyle);

    const velocity = new THREE.Vector3();
    const moveVector = new THREE.Vector3();
    const cameraTarget = new THREE.Vector3();
    let canJump = true;

    let orbitYaw = Math.PI;
    let orbitPitch = 0.28;
    let cameraDistance = 8;
    let rotatingCamera = false;

    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(120, 160, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -320;
    sun.shadow.camera.right = 320;
    sun.shadow.camera.top = 320;
    sun.shadow.camera.bottom = -320;
    sun.shadow.camera.near = 20;
    sun.shadow.camera.far = 700;
    scene.add(sun);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    scene.add(new THREE.HemisphereLight(0x9ec8ff, 0x3f5f3d, 0.25));

    function makeGround() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(800, 800),
        new THREE.MeshStandardMaterial({ color: 0x4d9f45 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function addRoad(x, z, w, d) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, 0.2, d),
        new THREE.MeshStandardMaterial({ color: 0x4f5358 })
      );
      mesh.position.set(x, 0.1, z);
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    function createRoadNetwork() {
      addRoad(0, 0, 760, 18);
      addRoad(0, -180, 720, 16);
      addRoad(0, 180, 700, 16);
      addRoad(-180, 0, 16, 760);
      addRoad(180, 0, 16, 760);
      addRoad(-280, -180, 14, 220);
      addRoad(-120, -220, 180, 14);
      addRoad(120, -100, 14, 240);
      addRoad(-250, 120, 180, 14);
      addRoad(-230, 60, 14, 220);
    }

    function addBuildingBox(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      collisionObjects.push(mesh);
      collisionBoxes.push(new THREE.Box3().setFromObject(mesh));
    }

    function makeWindow(x, y, z, rotY = 0) {
      const windowMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.75, 0.65, 0.05),
        new THREE.MeshStandardMaterial({
          color: 0xa8d8ff,
          emissive: 0xffcc77,
          emissiveIntensity: 0
        })
      );
      windowMesh.position.set(x, y, z);
      windowMesh.rotation.y = rotY;
      scene.add(windowMesh);
      houseWindows.push(windowMesh);
    }

    function makeHouse(cx, cz, color, w, h, d, roofType) {
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color })
      );
      body.position.set(cx, h / 2, cz);
      addBuildingBox(body);

      let roof;
      if (roofType % 2 === 0) {
        roof = new THREE.Mesh(
          new THREE.ConeGeometry(Math.max(w, d) * 0.62, 1.9, 4),
          new THREE.MeshStandardMaterial({ color: 0x5b2f26 })
        );
        roof.rotation.y = Math.PI * 0.25;
      } else {
        roof = new THREE.Mesh(
          new THREE.BoxGeometry(w + 0.7, 1.2, d + 0.7),
          new THREE.MeshStandardMaterial({ color: 0x70433a })
        );
      }
      roof.position.set(cx, h + 0.9, cz);
      roof.castShadow = true;
      scene.add(roof);

      const door = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1.8, 0.08),
        new THREE.MeshStandardMaterial({ color: 0x4a2f22 })
      );
      door.position.set(cx, 0.95, cz + d / 2 + 0.05);
      door.castShadow = true;
      scene.add(door);

      makeWindow(cx - w * 0.2, 1.7, cz + d / 2 + 0.06);
      makeWindow(cx + w * 0.2, 1.7, cz + d / 2 + 0.06);
      makeWindow(cx, 1.8, cz - d / 2 - 0.06, Math.PI);
    }

    function createResidential() {
      const colors = [
        0xff8a80, 0xffc870, 0xa4d98f, 0x7ec8ff, 0xa8a1ff, 0xffa1d2,
        0xf3e27a, 0x93e0da, 0xd0b7ff, 0xffb37c, 0x8fd17a, 0x80b5ff
      ];
      let idx = 0;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 4; c++) {
          const x = -280 + c * 50;
          const z = -280 + r * 58;
          const w = 14 + (idx % 3);
          const h = 8 + (idx % 4);
          const d = 11 + ((idx + 1) % 4);
          makeHouse(x, z, colors[idx], w, h, d, idx);
          idx += 1;
        }
      }
    }

    function createShop(x, z, w, h, d, color) {
      const shop = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color })
      );
      shop.position.set(x, h / 2, z);
      addBuildingBox(shop);

      const awning = new THREE.Mesh(
        new THREE.BoxGeometry(w + 0.5, 0.6, 1.8),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      awning.position.set(x, 2.1, z + d / 2 + 0.9);
      awning.castShadow = true;
      scene.add(awning);

      makeWindow(x, 2.8, z + d / 2 + 0.06);
    }

    function createHighStreet() {
      const shops = [
        { x: -75, z: -24, c: 0x89d7f0 },
        { x: -40, z: -24, c: 0xa7d98e },
        { x: -5, z: -24, c: 0x9ab1ff },
        { x: 30, z: -24, c: 0xffb270 },
        { x: 65, z: -24, c: 0xd1b0ff }
      ];
      for (const s of shops) {
        createShop(s.x, s.z, 24, 9, 16, s.c);
      }

      const petrol = new THREE.Mesh(
        new THREE.BoxGeometry(28, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0xdddddd })
      );
      petrol.position.set(80, 4, 26);
      addBuildingBox(petrol);

      const canopy = new THREE.Mesh(
        new THREE.BoxGeometry(34, 1, 20),
        new THREE.MeshStandardMaterial({ color: 0xc53030 })
      );
      canopy.position.set(80, 8.8, 26);
      canopy.castShadow = true;
      scene.add(canopy);
    }

    function createCivic() {
      const hospital = new THREE.Mesh(
        new THREE.BoxGeometry(44, 14, 26),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      hospital.position.set(92, 7, -120);
      addBuildingBox(hospital);

      const police = new THREE.Mesh(
        new THREE.BoxGeometry(32, 10, 22),
        new THREE.MeshStandardMaterial({ color: 0x3f74d6 })
      );
      police.position.set(145, 5, -125);
      addBuildingBox(police);

      const fire = new THREE.Mesh(
        new THREE.BoxGeometry(34, 10, 24),
        new THREE.MeshStandardMaterial({ color: 0xd64444 })
      );
      fire.position.set(172, 5, -74);
      addBuildingBox(fire);

      const school = new THREE.Mesh(
        new THREE.BoxGeometry(46, 12, 30),
        new THREE.MeshStandardMaterial({ color: 0xd4c49a })
      );
      school.position.set(110, 6, -42);
      addBuildingBox(school);

      const church = new THREE.Mesh(
        new THREE.BoxGeometry(24, 12, 18),
        new THREE.MeshStandardMaterial({ color: 0xf6f6f6 })
      );
      church.position.set(168, 6, -18);
      addBuildingBox(church);

      const steeple = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.6, 18, 10),
        new THREE.MeshStandardMaterial({ color: 0xfafafa })
      );
      steeple.position.set(168, 16, -18);
      steeple.castShadow = true;
      scene.add(steeple);
    }

    function createTree(x, z, scale = 1) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45 * scale, 0.6 * scale, 3.2 * scale, 8),
        new THREE.MeshStandardMaterial({ color: 0x7b4f2b })
      );
      trunk.position.set(x, 1.6 * scale, z);
      trunk.castShadow = true;

    let audioCtx = null;
    let sfxGain = null;
    let rainNoise = null;
    let rainGain = null;
    let rainFilter = null;

    function ensureAudio() {
      if (audioCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      sfxGain = audioCtx.createGain();
      sfxGain.gain.value = Number(document.getElementById("sfxVolume").value);
      sfxGain.connect(audioCtx.destination);

      rainGain = audioCtx.createGain();
      rainGain.gain.value = 0;
      rainFilter = audioCtx.createBiquadFilter();
      rainFilter.type = "lowpass";
      rainFilter.frequency.value = 1800;

      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
      const ch = buffer.getChannelData(0);
      for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * 0.3;

      rainNoise = audioCtx.createBufferSource();
      rainNoise.buffer = buffer;
      rainNoise.loop = true;
      rainNoise.connect(rainFilter);
      rainFilter.connect(rainGain);
      rainGain.connect(audioCtx.destination);
      rainNoise.start();
      updateRainNoiseState();
    }

    function updateRainNoiseState() {
      if (!audioCtx || !rainGain) return;
      const target = state.weather === "rain" ? 0.22 * Number(document.getElementById("musicVolume").value) : 0;
      rainGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.08);
    }

    function playFootstep() {
      if (!audioCtx || !sfxGain) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.value = 120 + Math.random() * 40;
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.1 * Number(document.getElementById("sfxVolume").value), audioCtx.currentTime + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.connect(gain);
      gain.connect(sfxGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.06);
    }

    function playJumpSound() {
      if (!audioCtx || !sfxGain) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(760, audioCtx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.18 * Number(document.getElementById("sfxVolume").value), audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.connect(gain);
      gain.connect(sfxGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.22);
    }

    function updateDayNight(dt) {
      state.timeOfDay = (state.timeOfDay + dt / 1200) % 1;

      const cycle = state.timeOfDay;
      const angle = cycle * Math.PI * 2 - Math.PI / 2;
      sun.position.set(Math.cos(angle) * 280, Math.max(20, Math.sin(angle) * 260), 130);

      const dayAmount = Math.max(0, Math.sin(angle) * 0.5 + 0.5);
      ambient.intensity = THREE.MathUtils.lerp(0.15, 0.6, dayAmount);

      let skyColor;
      if (cycle < 0.25) {
        skyColor = lerpColor(skyColors.night, skyColors.dawn, cycle / 0.25);
      } else if (cycle < 0.5) {
        skyColor = lerpColor(skyColors.dawn, skyColors.day, (cycle - 0.25) / 0.25);
      } else if (cycle < 0.75) {
        skyColor = lerpColor(skyColors.day, skyColors.dusk, (cycle - 0.5) / 0.25);
      } else {
        skyColor = lerpColor(skyColors.dusk, skyColors.night, (cycle - 0.75) / 0.25);
      }
      scene.background = skyColor;

      const isNight = cycle > 0.74 || cycle < 0.22;
      stars.material.opacity = isNight ? 0.95 : 0;

      for (const lamp of streetlamps) {
        lamp.light.intensity = isNight ? 1.2 : 0;
        lamp.bulbMat.emissiveIntensity = isNight ? 0.9 : 0.05;
      }

      for (const win of houseWindows) {
        win.material.emissiveIntensity = isNight ? 0.85 : 0;
      }

      const tString = timeToClockString(cycle);
      clockText.textContent = tString;
      mapClock.textContent = tString;
    }

    function updateWeather(dt) {
      state.weatherTimer += dt;
      if (state.weatherTimer >= state.weatherDuration) nextRandomWeather();

      if (state.weather === "rain") {
        const arr = rain.geometry.attributes.position.array;
        for (let i = 0; i < rainCount; i++) {
          const p = state.rainPositions[i];
          p.y -= dt * 35;
          if (p.y < 0.5) {
            p.y = 80 + Math.random() * 120;
            p.x = player.position.x + (Math.random() - 0.5) * 280;
            p.z = player.position.z + (Math.random() - 0.5) * 280;
          }
          const idx = i * 6;
          arr[idx] = p.x;
          arr[idx + 1] = p.y;
          arr[idx + 2] = p.z;
          arr[idx + 3] = p.x;
          arr[idx + 4] = p.y - 2;
          arr[idx + 5] = p.z;
        }
        rain.geometry.attributes.position.needsUpdate = true;
      }

      if (state.weather === "snow") {
        for (let i = 0; i < snowCount; i++) {
          const p = state.snowPositions[i];
          p.y -= dt * 3.8;
          p.x += Math.sin((p.z + i) * 0.01 + performance.now() * 0.0004) * dt * 0.7;
          if (p.y < 0.4) {
            p.y = 50 + Math.random() * 120;
            p.x = player.position.x + (Math.random() - 0.5) * 300;
            p.z = player.position.z + (Math.random() - 0.5) * 300;
          }
          tempMatrix.makeTranslation(p.x, p.y, p.z);
          snowMesh.setMatrixAt(i, tempMatrix);
        }
        snowMesh.instanceMatrix.needsUpdate = true;
      }
    }

    function getPlayerAABB(pos) {
      return {
        minX: pos.x - 0.38,
        maxX: pos.x + 0.38,
        minY: pos.y - 1,
        maxY: pos.y + 0.9,
        minZ: pos.z - 0.38,
        maxZ: pos.z + 0.38
      };
    }

    function resolvePlayerCollisions(previousPos) {
      const a = getPlayerAABB(player.position);
      for (const b of collisionBoxes) {
        if (
          a.maxX < b.min.x || a.minX > b.max.x ||
          a.maxY < b.min.y || a.minY > b.max.y ||
          a.maxZ < b.min.z || a.minZ > b.max.z
        ) continue;

        const overlapX = Math.min(a.maxX - b.min.x, b.max.x - a.minX);
        const overlapZ = Math.min(a.maxZ - b.min.z, b.max.z - a.minZ);

        if (overlapX < overlapZ) {
          if (previousPos.x <= b.min.x) player.position.x -= overlapX;
          else player.position.x += overlapX;
        } else {
          if (previousPos.z <= b.min.z) player.position.z -= overlapZ;
          else player.position.z += overlapZ;
        }

        a.minX = player.position.x - 0.38;
        a.maxX = player.position.x + 0.38;
        a.minZ = player.position.z - 0.38;
        a.maxZ = player.position.z + 0.38;
      }
    }

    function isInWater(x, z) {
      return x >= beachWaterBounds.minX && x <= beachWaterBounds.maxX && z >= beachWaterBounds.minZ && z <= beachWaterBounds.maxZ;
    }

    let footstepTimer = 0;

    function updatePlayer(dt) {
      if (state.sitting) {
        if (keys["KeyW"] || keys["KeyA"] || keys["KeyS"] || keys["KeyD"] || keys["Space"]) {
          state.sitting = false;
        }
      }

      const inWater = isInWater(player.position.x, player.position.z);
      const groundY = inWater ? 0.3 : 1;
      state.swimMode = player.position.y < 0.5 || (inWater && player.position.y <= 1.2);

      const inputX = (keys["KeyD"] ? 1 : 0) - (keys["KeyA"] ? 1 : 0);
      const inputZ = (keys["KeyW"] ? 1 : 0) - (keys["KeyS"] ? 1 : 0);
      let moving = inputX !== 0 || inputZ !== 0;

      const forward = new THREE.Vector3(Math.sin(orbitYaw), 0, Math.cos(orbitYaw));
      const right = new THREE.Vector3(forward.z, 0, -forward.x);

      moveVector.set(0, 0, 0);
      moveVector.addScaledVector(forward, inputZ);
      moveVector.addScaledVector(right, inputX);
      if (moveVector.lengthSq() > 0) moveVector.normalize();

      const wantsRun = keys["ShiftLeft"] || keys["ShiftRight"];
      let speed = 5;
      if (wantsRun && state.stamina > 0 && !state.swimMode) speed = 8;
      if (state.swimMode) speed = 2.4;

      if (speed === 8 && moving) {
        state.stamina = Math.max(0, state.stamina - 20 * dt);
        if (state.stamina === 0) speed = 5;
      } else {
        state.stamina = Math.min(100, state.stamina + 10 * dt);
      }

      if (state.sitting) moving = false;

      const previousPos = player.position.clone();
      player.position.addScaledVector(moveVector, speed * dt);

      if (!state.swimMode) {
        velocity.y -= 20 * dt;
        player.position.y += velocity.y * dt;

        if (player.position.y <= groundY) {
          player.position.y = groundY;
          velocity.y = 0;
          canJump = true;
        }
      } else {
        canJump = false;
        const bob = Math.sin(performance.now() * 0.006) * 0.08;
        player.position.y = 0.34 + bob;
        velocity.y = 0;
      }

      if (moving && !state.sitting && !state.swimMode) {
        const targetRot = Math.atan2(moveVector.x, moveVector.z);
        const delta = Math.atan2(Math.sin(targetRot - player.rotation.y), Math.cos(targetRot - player.rotation.y));
        player.rotation.y += delta * Math.min(1, dt * 12);
      }

      resolvePlayerCollisions(previousPos);

      player.position.x = THREE.MathUtils.clamp(player.position.x, -390, 390);
      player.position.z = THREE.MathUtils.clamp(player.position.z, -390, 390);

      if (!moving || state.sitting || state.swimMode) {
        footstepTimer = 0;
      } else {
        footstepTimer += dt;
        const stepGap = speed > 5 ? 0.25 : 0.4;
        if (footstepTimer >= stepGap) {
          footstepTimer = 0;
          playFootstep();
        }
      }
    }

    function updateEmote(dt) {
      const t = performance.now() * 0.001;
      const emote = state.emoteIndex;

      rightArmPivot.rotation.set(0, 0, 0);
      leftArmPivot.rotation.set(0, 0, 0);
      torso.rotation.set(0, 0, 0);

      if (emote === 1) {
        rightArmPivot.rotation.x = -1.2 + Math.sin(t * 7) * 0.35;
        rightArmPivot.rotation.z = -0.2;
      } else if (emote === 2) {
        torso.rotation.z = Math.sin(t * 5) * 0.22;
        leftArmPivot.rotation.x = Math.sin(t * 6) * 0.5;
        rightArmPivot.rotation.x = -Math.sin(t * 6) * 0.5;
      } else if (emote === 3) {
        leftArmPivot.rotation.x = -0.9 + Math.sin(t * 8) * 0.25;
        rightArmPivot.rotation.x = -0.9 - Math.sin(t * 8) * 0.25;
      } else if (emote === 4) {
        player.rotation.y += dt * 3.8;
      }

      if (state.sitting) {
        torso.rotation.x = -0.22;
        leftLeg.rotation.x = 1.35;
        rightLeg.rotation.x = 1.35;
      } else {
        leftLeg.rotation.x = 0;
        rightLeg.rotation.x = 0;
      }
    }

    function updatePrompt() {
      let nearBench = false;
      for (const b of benches) {
        if (b.distanceTo(player.position) < 2.5) {
          nearBench = true;
          break;
        }
      }

      if (nearBench) {
        interactionPrompt.textContent = "Press F to Sit";
        interactionPrompt.style.opacity = "1";
      } else {
        interactionPrompt.textContent = "Press E to Emote";
        interactionPrompt.style.opacity = "1";
      }
    }

    function updateCamera(dt) {
      const headPos = new THREE.Vector3(player.position.x, player.position.y + 0.85, player.position.z);
      if (state.firstPerson) {
        const lookDir = new THREE.Vector3(
          Math.sin(orbitYaw) * Math.cos(orbitPitch),
          Math.sin(orbitPitch),
          Math.cos(orbitYaw) * Math.cos(orbitPitch)
        );
        camera.position.lerp(headPos, Math.min(1, dt * 16));
        camera.lookAt(headPos.clone().add(lookDir.multiplyScalar(10)));
        return;
      }

      cameraTarget.set(player.position.x, player.position.y + 1.2, player.position.z);
      const offset = new THREE.Vector3(
        Math.sin(orbitYaw) * Math.cos(orbitPitch),
        Math.sin(orbitPitch),
        Math.cos(orbitYaw) * Math.cos(orbitPitch)
      ).multiplyScalar(-cameraDistance);
      offset.y += 4;

      const desired = cameraTarget.clone().add(offset);
      camera.position.lerp(desired, Math.min(1, dt * 7));
      camera.lookAt(cameraTarget);
    }

    function updateMinimap() {
      miniCamera.position.set(player.position.x, 260, player.position.z);
      miniCamera.lookAt(player.position.x, 0, player.position.z);
      miniRenderer.render(scene, miniCamera);

      const nx = (player.position.x + 400) / 800;
      const nz = (player.position.z + 400) / 800;
      mapPlayer.style.left = `${(nx * 100).toFixed(2)}%`;
      mapPlayer.style.top = `${(nz * 100).toFixed(2)}%`;
      state.mapBlink += 0.04;
      mapPlayer.style.opacity = `${0.65 + Math.sin(state.mapBlink * 4) * 0.35}`;
    }

    function updateBeachWater() {
      if (!waterMesh || !waterBasePositions) return;
      const attr = waterMesh.geometry.attributes.position;
      const arr = attr.array;
      const t = performance.now() * 0.001;
      for (let i = 0; i < arr.length; i += 3) {
        const x = waterBasePositions[i];
        const z = waterBasePositions[i + 2];
        arr[i + 2] = z;
        arr[i + 1] = waterBasePositions[i + 1] + Math.sin(x * 0.07 + t * 1.8) * 0.22 + Math.cos(z * 0.05 + t * 1.5) * 0.15;
      }
      attr.needsUpdate = true;
      waterMesh.geometry.computeVertexNormals();
    }

    function updateHUD() {
      balanceText.textContent = `$${Math.floor(state.balance)}`;
      staminaBar.style.width = `${state.stamina}%`;
      healthBar.style.width = `${state.health}%`;
    }

    function animate() {
      requestAnimationFrame(animate);
      if (state.paused) return;

      const dt = Math.min(0.05, clock.getDelta());
      updatePlayer(dt);
      updateEmote(dt);
      updatePrompt();
      updateDayNight(dt);
      updateWeather(dt);
      updateBeachWater();
      updateZoneName(dt);
      updateCamera(dt);
      updateMinimap();
      updateHUD();

      renderer.render(scene, camera);
    }

    function trySit() {
      for (const b of benches) {
        if (b.distanceTo(player.position) < 2.5) {
          state.sitting = !state.sitting;
          if (state.sitting) {
            player.position.set(b.x, b.y - 0.08, b.z + 0.1);
          }
          return;
        }
      }
    }

    function togglePause(next) {
      state.paused = next;
      pauseOverlay.style.display = next ? "flex" : "none";
    }

    function toggleMap(next) {
      state.mapOpen = next;
      mapOverlay.style.display = next ? "flex" : "none";
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Escape") {
        e.preventDefault();
        if (state.mapOpen) {
          toggleMap(false);
          return;
        }
        togglePause(!state.paused);
        return;
      }

      if (state.paused) return;

      keys[e.code] = true;
      if (e.code === "Space" && canJump && !state.swimMode && !state.sitting) {
        velocity.y = 10;
        canJump = false;
        playJumpSound();
      }
      if (e.code === "KeyE") {
        state.emoteIndex = (state.emoteIndex + 1) % 5;
      }
      if (e.code === "KeyF") {
        trySit();
      }
      if (e.code === "KeyV") {
        state.firstPerson = !state.firstPerson;
      }
      if (e.code === "KeyM") {
        toggleMap(!state.mapOpen);
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    window.addEventListener("contextmenu", (e) => e.preventDefault());

    window.addEventListener("mousedown", (e) => {
      ensureAudio();
      if (e.button === 2) rotatingCamera = true;
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button === 2) rotatingCamera = false;
    });

    window.addEventListener("mousemove", (e) => {
      if (!rotatingCamera) return;
      orbitYaw -= e.movementX * 0.0045;
      orbitPitch -= e.movementY * 0.003;
      orbitPitch = THREE.MathUtils.clamp(orbitPitch, -0.38, 0.9);
    });

    window.addEventListener("wheel", (e) => {
      cameraDistance += e.deltaY * 0.01;
      cameraDistance = THREE.MathUtils.clamp(cameraDistance, 5, 15);
    }, { passive: true });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    document.getElementById("resumeBtn").addEventListener("click", () => togglePause(false));
    document.getElementById("saveBtn").addEventListener("click", saveGame);
    document.getElementById("loadBtn").addEventListener("click", loadGame);
    document.getElementById("quitBtn").addEventListener("click", () => {
      if (confirm("Quit to title? Unsaved progress will be lost.")) window.location.reload();
    });

    document.getElementById("musicVolume").addEventListener("input", updateRainNoiseState);
    document.getElementById("sfxVolume").addEventListener("input", () => {
      if (!audioCtx || !sfxGain) return;
      sfxGain.gain.setTargetAtTime(Number(document.getElementById("sfxVolume").value), audioCtx.currentTime, 0.05);
    });

    mapOverlay.addEventListener("click", (e) => {
      if (e.target === mapOverlay) toggleMap(false);
    });

    pauseOverlay.addEventListener("click", (e) => {
      if (e.target === pauseOverlay) togglePause(false);
    });

    buildWorld();
    setWeather("sunny");
    loadGame();
    updateHUD();
    animate();
  </script>
</body>
</html>
