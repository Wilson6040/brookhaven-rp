<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brookhaven RP — 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#hud{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:6px}
.hb{background:rgba(0,0,0,.65);color:#fff;padding:5px 13px;border-radius:10px;font-size:13px;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(4px)}
.hb b{color:#f9e05e}
#ctrl{position:absolute;bottom:14px;left:14px;background:rgba(0,0,0,.65);color:rgba(255,255,255,.75);font-size:11px;padding:8px 12px;border-radius:10px;line-height:2;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(4px)}
#ctrl b{color:#a8d8ea}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;opacity:.5;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#location-popup{position:absolute;top:42%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#f9e05e;font-size:1rem;font-weight:bold;padding:8px 22px;border-radius:10px;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;border:1px solid rgba(249,224,94,.3)}
#prompt{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#f9e05e;font-size:12px;padding:5px 16px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
#chatbox{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:340px;background:rgba(0,0,0,.65);border-radius:10px;border:1px solid rgba(255,255,255,.12);padding:8px;pointer-events:all;backdrop-filter:blur(4px)}
#chatlog{height:55px;overflow-y:auto;font-size:11px;color:#ddd;margin-bottom:5px;padding:2px 4px}
#chatlog div{margin-bottom:2px}#chatlog .nm{color:#f8c8d4;font-weight:bold}
#chatin{display:none;width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:5px;padding:4px 8px;font-size:12px;outline:none}
/* Wardrobe */
#wdrobe{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,28,.97);border:2px solid #f8c8d4;border-radius:16px;padding:14px 18px;color:#fff;display:none;z-index:20;pointer-events:all;width:580px;max-height:90vh;overflow-y:auto;backdrop-filter:blur(8px)}
#wdrobe h2{color:#f8c8d4;font-size:1rem;margin-bottom:12px;text-align:center}
#wdrobe-inner{display:flex;gap:14px;align-items:flex-start}
#preview-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px}
#pvc{border-radius:12px;background:linear-gradient(160deg,#1e1e3a,#2a1a3a);border:2px solid rgba(248,200,212,.3);display:block}
#pvc-label{font-size:11px;color:#aaa}
#wdrobe-opts{flex:1;min-width:0}
.wtabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.wt{flex:1;padding:4px 2px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;font-size:10px;text-align:center;color:#ccc;white-space:nowrap}
.wt.on{background:#f8c8d4;color:#1a1a2e;font-weight:bold}
.wsec{display:none}.wsec.on{display:block}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.wi{background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:8px;padding:5px 3px;cursor:pointer;text-align:center;font-size:9px;color:#bbb}
.wi:hover{background:rgba(255,255,255,.12)}.wi.on{border-color:#f8c8d4;background:rgba(248,200,212,.1);color:#fff}
.wi .ico{font-size:1.4rem;display:block;margin-bottom:2px}
.crow{margin-bottom:9px}.crow label{font-size:11px;color:#aaa;display:block;margin-bottom:4px}
.swts{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.sw.on{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.3)}
.cbtn{margin-top:10px;width:100%;padding:7px;background:#f8c8d4;color:#1a1a2e;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:12px}
/* minimap */
#minimap{position:absolute;top:14px;right:14px;width:130px;height:100px;border-radius:8px;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);overflow:hidden}
#minimap canvas{width:130px;height:100px}
/* loading */
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
#loading h1{color:#f8c8d4;font-size:1.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
#loading p{color:#aaa;font-size:.9rem}
#loadbar{width:260px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:20px;overflow:hidden}
#loadfill{height:100%;background:#f8c8d4;border-radius:3px;width:0%;transition:width .3s}
</style>
</head>
<body>
<div id="loading">
  <h1>🏘️ Brookhaven RP</h1>
  <p>Loading 3D World...</p>
  <div id="loadbar"><div id="loadfill"></div></div>
</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hb">💰 $<b id="money">500</b></div>
    <div class="hb" id="vhud" style="display:none">🚗 Driving — <b>Space</b> exit</div>
    <div class="hb">🕐 <b id="tstr">12:00 PM</b></div>
    <div class="hb" id="loc-hud">📍 <b id="loc-name">Town Square</b></div>
  </div>
  <div id="minimap"><canvas id="mm" width="130" height="100"></canvas></div>
  <div id="crosshair"></div>
  <div id="location-popup"></div>
  <div id="prompt"></div>
  <div id="ctrl">
    <b>↑↓←→ / WASD</b> Move &nbsp; <b>Mouse</b> Look<br>
    <b>Space</b> ⚔️ Swing / Exit Car &nbsp; <b>E</b> Enter/Drive<br>
    <b>T</b> Chat &nbsp; <b>W</b> Wardrobe &nbsp; <b>ESC</b> Close
  </div>
  <div id="chatbox">
    <div id="chatlog"></div>
    <input id="chatin" type="text" placeholder="Press T to chat..." maxlength="60">
  </div>
  <!-- Wardrobe -->
  <div id="wdrobe">
    <h2>👕 Wardrobe</h2>
    <div id="wdrobe-inner">
      <div id="preview-wrap">
        <canvas id="pvc" width="130" height="210"></canvas>
        <div id="pvc-label">Live Preview</div>
      </div>
      <div id="wdrobe-opts">
        <div class="wtabs">
          <div class="wt on" onclick="wTab('skin')">🎨 Skin</div>
          <div class="wt" onclick="wTab('hair')">💇 Hair</div>
          <div class="wt" onclick="wTab('tops')">👕 Tops</div>
          <div class="wt" onclick="wTab('bots')">👖 Bottoms</div>
          <div class="wt" onclick="wTab('hats')">🎩 Hats</div>
          <div class="wt" onclick="wTab('acc')">🕶️ Extras</div>
        </div>
        <div class="wsec on" id="tab-skin">
          <div class="crow"><label>Skin Tone</label><div class="swts" id="sk-sw"></div></div>
          <div class="crow"><label>Eye Colour</label><div class="swts" id="ey-sw"></div></div>
        </div>
        <div class="wsec" id="tab-hair">
          <div class="wgrid" id="hs-gr"></div>
          <div class="crow"><label>Colour</label><div class="swts" id="hc-sw"></div></div>
        </div>
        <div class="wsec" id="tab-tops">
          <div class="wgrid" id="tp-gr"></div>
          <div class="crow"><label>Colour</label><div class="swts" id="tc-sw"></div></div>
        </div>
        <div class="wsec" id="tab-bots">
          <div class="wgrid" id="bt-gr"></div>
          <div class="crow"><label>Colour</label><div class="swts" id="bc-sw"></div></div>
        </div>
        <div class="wsec" id="tab-hats">
          <div class="wgrid" id="ht-gr"></div>
          <div class="crow"><label>Colour</label><div class="swts" id="htc-sw"></div></div>
        </div>
        <div class="wsec" id="tab-acc">
          <div class="wgrid" id="ac-gr"></div>
        </div>
        <button class="cbtn" onclick="closeW()">✓ Done</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  BROOKHAVEN RP  —  3D Edition
// ═══════════════════════════════════════════════════════════════

// ── Loading bar ────────────────────────────────────────────────
let loadPct = 0;
function setLoad(p){ loadPct=p; document.getElementById('loadfill').style.width=p+'%'; }
function hideLoad(){ const el=document.getElementById('loading'); el.style.opacity='0'; setTimeout(()=>el.style.display='none',1000); }

// ── Wardrobe data ──────────────────────────────────────────────
const SK_C=['#FDBCB4','#F1C27D','#E0AC69','#C68642','#8D5524','#FFCBA4','#A0522D'];
const EY_C=['#333','#1a5276','#145a32','#784212','#6c3483','#c0392b'];
const HC_C=['#4A3728','#B5651D','#E8D5B7','#2C2C2C','#E34234','#F4D03F','#FFB6C1','#7B68EE','#00CED1'];
const TC_C=['#7EC8E3','#F8C8D4','#A8D8B9','#FFE066','#C9B1FF','#FF8C69','#fff','#333','#E34234','#2ECC71','#E67E22','#9B59B6'];
const BC_C=['#4A6FA5','#333','#8B6914','#A8D8B9','#C8C8C8','#fff','#2C2C2C','#8e44ad','#c0392b','#e67e22'];
const HT_C=['#E34234','#7EC8E3','#F9E05E','#333','#fff','#A8D8B9','#C9B1FF','#F8C8D4','#8B4513'];
const HSTYLES=[{id:'none',ico:'🧑',lb:'Bald'},{id:'short',ico:'👱',lb:'Short'},{id:'long',ico:'👩',lb:'Long'},{id:'afro',ico:'🙎',lb:'Afro'},{id:'bun',ico:'👩‍🦱',lb:'Bun'},{id:'spiky',ico:'🦔',lb:'Spiky'},{id:'fringe',ico:'🧑‍🦱',lb:'Fringe'},{id:'curly',ico:'🧑‍🦳',lb:'Curly'}];
const TOPS=[{id:'tee',ico:'👕',lb:'T-Shirt'},{id:'hoodie',ico:'🧥',lb:'Hoodie'},{id:'shirt',ico:'👔',lb:'Shirt'},{id:'vest',ico:'🦺',lb:'Vest'},{id:'suit',ico:'🤵',lb:'Suit'},{id:'polo',ico:'👗',lb:'Polo'},{id:'tank',ico:'🩱',lb:'Tank'},{id:'jumper',ico:'🧶',lb:'Jumper'}];
const BOTS=[{id:'jeans',ico:'👖',lb:'Jeans'},{id:'shorts',ico:'🩳',lb:'Shorts'},{id:'skirt',ico:'👗',lb:'Skirt'},{id:'joggers',ico:'🩲',lb:'Joggers'},{id:'trousers',ico:'👔',lb:'Trousers'},{id:'leggings',ico:'🦵',lb:'Leggings'}];
const HATS=[{id:'none',ico:'🚫',lb:'No Hat'},{id:'cap',ico:'🧢',lb:'Cap'},{id:'beanie',ico:'🎩',lb:'Beanie'},{id:'cowboy',ico:'🤠',lb:'Cowboy'},{id:'crown',ico:'👑',lb:'Crown'},{id:'chef',ico:'👨‍🍳',lb:'Chef'},{id:'police',ico:'👮',lb:'Police'},{id:'party',ico:'🎉',lb:'Party'}];
const ACCS=[{id:'glasses',ico:'🕶️',lb:'Sunglasses'},{id:'backpack',ico:'🎒',lb:'Backpack'},{id:'badge',ico:'🏅',lb:'Badge'},{id:'scarf',ico:'🧣',lb:'Scarf'}];

// Player appearance state
const P = {
  sk:'#FDBCB4',ey:'#333',hs:'short',hc:'#4A3728',
  ts:'hoodie',tc:'#7EC8E3',bs:'jeans',bc:'#4A6FA5',
  hat:'none',htc:'#E34234',
  glasses:false,backpack:false,badge:false,scarf:false,
  nm:'Player'
};

// ── THREE.js Setup ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 8, 15);

window.addEventListener('resize', ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── Lighting ───────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x8090b0, 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias = -0.0005;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4060a0, 0.3);
fill.position.set(-20, 10, -20);
scene.add(fill);

// Moon light (for night)
const moon = new THREE.DirectionalLight(0x3050a0, 0);
moon.position.set(-40, 60, -30);
scene.add(moon);

setLoad(10);

// ── Helpers ────────────────────────────────────────────────────
function hex(col){ return new THREE.Color(col); }
function mat(col, rough=0.8, metal=0){ return new THREE.MeshStandardMaterial({color:hex(col),roughness:rough,metalness:metal}); }
function shadow(mesh){ mesh.castShadow=true; mesh.receiveShadow=true; return mesh; }
function box(w,h,d,col,rough){ return shadow(new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat(col,rough))); }

// ── Ground ─────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400,60,60),
  new THREE.MeshStandardMaterial({color:0x7ec87e,roughness:0.95})
);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true;
scene.add(ground);

// ── Roads ──────────────────────────────────────────────────────
function makeRoad(x,z,w,d){
  const r = new THREE.Mesh(new THREE.PlaneGeometry(w,d), new THREE.MeshStandardMaterial({color:0x888888,roughness:0.9}));
  r.rotation.x=-Math.PI/2; r.position.set(x,0.01,z); r.receiveShadow=true; scene.add(r);
  // Dashes
  if(w>d){ for(let i=-w/2+4;i<w/2;i+=8){ const dash=new THREE.Mesh(new THREE.PlaneGeometry(4,0.3),new THREE.MeshStandardMaterial({color:0xdddddd})); dash.rotation.x=-Math.PI/2; dash.position.set(x+i,0.02,z); scene.add(dash); } }
  else{ for(let i=-d/2+4;i<d/2;i+=8){ const dash=new THREE.Mesh(new THREE.PlaneGeometry(0.3,4),new THREE.MeshStandardMaterial({color:0xdddddd})); dash.rotation.x=-Math.PI/2; dash.position.set(x,0.02,z+i); scene.add(dash); } }
}
makeRoad(0,0,200,8); makeRoad(0,-40,200,8); makeRoad(0,40,200,8);
makeRoad(-30,0,8,200); makeRoad(30,0,8,200); makeRoad(70,0,8,200);
makeRoad(-70,0,8,200);
// Pavement
function makePavement(x,z,w,d){ const p=new THREE.Mesh(new THREE.PlaneGeometry(w,d),new THREE.MeshStandardMaterial({color:0xd0c8b8,roughness:1.0})); p.rotation.x=-Math.PI/2; p.position.set(x,0.015,z); scene.add(p); }

setLoad(20);

// ── Building factory ───────────────────────────────────────────
const buildingDefs = [];
function makeBuilding(x,z,w,h,d,wallCol,roofCol,label,glowCol='#aaddff'){
  const group = new THREE.Group();
  // Main body
  const body = box(w,h,d,wallCol,0.75);
  body.position.y=h/2; group.add(body);
  // Roof
  const roof = box(w+0.4,0.4,d+0.4,roofCol,0.6);
  roof.position.y=h+0.2; group.add(roof);
  // Windows - front & back faces
  const winMat = new THREE.MeshStandardMaterial({color:0x88ccee,emissive:0x224466,emissiveIntensity:0.6,roughness:0.1,metalness:0.2});
  for(let wy=1.2;wy<h-0.8;wy+=2.2){
    for(let wx=-w/2+1.2;wx<w/2-0.4;wx+=2.0){
      [d/2+0.02,-d/2-0.02].forEach((zOff,side)=>{
        const wm = new THREE.Mesh(new THREE.PlaneGeometry(1.0,1.2),winMat.clone());
        wm.position.set(wx+0.5,wy,zOff); if(side===1)wm.rotation.y=Math.PI;
        group.add(wm);
      });
    }
  }
  // Door
  const doorMat = new THREE.MeshStandardMaterial({color:0x8B4513,roughness:0.9});
  const door = new THREE.Mesh(new THREE.PlaneGeometry(1.2,2.2),doorMat);
  door.position.set(0,1.1,d/2+0.02); group.add(door);
  // Sign
  const signCanvas = document.createElement('canvas');
  signCanvas.width=256; signCanvas.height=64;
  const sc=signCanvas.getContext('2d');
  sc.fillStyle='rgba(0,0,0,0.8)'; sc.fillRect(0,0,256,64);
  sc.fillStyle='#f9e05e'; sc.font='bold 22px Segoe UI'; sc.textAlign='center'; sc.textBaseline='middle';
  sc.fillText(label,128,32);
  const signTex = new THREE.CanvasTexture(signCanvas);
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(4,1),new THREE.MeshBasicMaterial({map:signTex,transparent:true}));
  sign.position.set(0,h+0.8,d/2+0.1); group.add(sign);
  group.position.set(x,0,z);
  scene.add(group);
  buildingDefs.push({group,x,z,w,d,label});
  return group;
}

// Town layout
makeBuilding(-55,-20,14,10,12,'#F8C8D4','#c0a0a8','🏠 House');
makeBuilding(-55,-45,18,12,14,'#C9B1FF','#9080c0','🏫 School');
makeBuilding(-10,-45,16,14,12,'#A8D8B9','#80b090','🏥 Hospital');
makeBuilding(45,-45,14,10,12,'#7EC8E3','#5090a8','🚔 Police');
makeBuilding(80,-40,18,16,14,'#aaaaaa','#888888','⛓️ Prison');
makeBuilding(-55,20,14,8,12,'#FFE066','#c0a830','🍕 Pizza');
makeBuilding(-10,22,16,10,12,'#F4D03F','#b89020','🏦 Bank');
makeBuilding(45,20,22,14,16,'#E8D5B7','#c0a878','🏰 Mansion');
makeBuilding(80,25,20,10,14,'#B5E7A0','#80b060','🚗 Dealer');
makeBuilding(80,-80,24,12,18,'#FF6B9D','#c04070','🎡 Carnival');
makeBuilding(-55,-80,16,10,12,'#FFB347','#c07820','🐾 Pet Shop');

setLoad(40);

// ── Trees ─────────────────────────────────────────────────────
function makeTree(x,z,scale=1){
  const g=new THREE.Group();
  const trunk=shadow(new THREE.Mesh(new THREE.CylinderGeometry(0.18*scale,0.28*scale,1.8*scale,8),mat('#6B3F2A',0.95)));
  trunk.position.y=0.9*scale; g.add(trunk);
  const foliage=shadow(new THREE.Mesh(new THREE.SphereGeometry(1.4*scale,8,6),mat('#228B22',0.85)));
  foliage.position.y=2.8*scale; g.add(foliage);
  // Second foliage layer
  const f2=shadow(new THREE.Mesh(new THREE.SphereGeometry(1.0*scale,8,5),mat('#2ecc71',0.85)));
  f2.position.set(0.4*scale,3.6*scale,0.2*scale); g.add(f2);
  g.position.set(x,0,z); scene.add(g);
}
const treePos=[[-45,5],[45,5],[-45,-30],[20,-60],[60,-60],[-20,30],[55,35],[38,15],[-65,40],[-25,-75],[20,-30],[65,10],[42,-28],[28,35],[-48,35],[-68,-60],[88,-60]];
treePos.forEach(([x,z])=>makeTree(x,z,0.8+Math.random()*0.5));

// ── Street lights ─────────────────────────────────────────────
const streetLights=[];
function makeStreetLight(x,z){
  const g=new THREE.Group();
  const pole=shadow(new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.12,5,8),mat('#555',0.6,0.3)));
  pole.position.y=2.5; g.add(pole);
  const arm=shadow(new THREE.Mesh(new THREE.BoxGeometry(1.2,0.1,0.1),mat('#555',0.6,0.3)));
  arm.position.set(0.5,5,0); g.add(arm);
  const bulbMat=new THREE.MeshStandardMaterial({color:0xffffaa,emissive:0xffffaa,emissiveIntensity:0.5});
  const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,6),bulbMat);
  bulb.position.set(1.0,4.9,0); g.add(bulb);
  // Point light (off by default — enabled at night)
  const pt=new THREE.PointLight(0xffffaa,0,8,1.5);
  pt.position.set(1.0,4.8,0); g.add(pt);
  g.position.set(x,0,z); scene.add(g);
  streetLights.push({bulbMat,pt});
}
[[-8,15],[8,15],[-8,-15],[8,-15],[-8,45],[8,45],[38,-55],[38,35],[78,-55],[78,35],[-58,-55],[-58,15]].forEach(([x,z])=>makeStreetLight(x,z));

setLoad(55);

// ── Cars ──────────────────────────────────────────────────────
const CAR_DEFS=[

  // Legs
  const ll=shadow(new THREE.Mesh(new THREE.BoxGeometry(0.32,0.95,0.32),c(P.bc)));

  le.position.set(-0.18,1.7,0.38); g.add(le);
  const re=le.clone(); re.position.set(0.18,1.7,0.38); g.add(re);

    hair.position.set(0,2.07,0); g.add(hair);
  }
  // Hat
  if(P.hat==='cap'){
    const hatMat=new THREE.MeshStandardMaterial({color:new THREE.Color(P.htc)});
    const brim=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.12,1.1),hatMat);
    brim.position.set(0.1,2.2,0.1); g.add(brim);
    const top=new THREE.Mesh(new THREE.BoxGeometry(0.78,0.4,0.78),hatMat);

    const b=new THREE.Mesh(new THREE.BoxGeometry(0.82,0.5,0.82),hatMat);
    b.position.y=2.25; g.add(b);
  }else if(P.hat==='crown'){
    const hatMat=new THREE.MeshStandardMaterial({color:0xFFD700});
    const b=new THREE.Mesh(new THREE.BoxGeometry(0.82,0.35,0.82),hatMat);
    b.position.y=2.2; g.add(b);
    for(let i=0;i<3;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.32,0.15),hatMat);s.position.set(-0.28+i*0.28,2.55,0);g.add(s);}
  }
  // Backpack
  if(P.backpack){
    const bpMat=new THREE.MeshStandardMaterial({color:0xE34234});
    const bp=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.6,0.2),bpMat);
    bp.position.set(0,0.95,-0.32); g.add(bp);
  }
  // Glasses
  if(P.glasses){

  }
  // Store refs for animation
  g.userData = {la,ra,ll,rl,head};
  return g;
}

const pvc=document.getElementById('pvc');const pvctx=pvc.getContext('2d');
function drawPv(){
  pvctx.clearRect(0,0,130,210);
  const g=pvctx.createLinearGradient(0,0,0,210);g.addColorStop(0,'#1e1e3a');g.addColorStop(1,'#2a1a3a');pvctx.fillStyle=g;pvctx.fillRect(0,0,130,210);
  pvctx.strokeStyle='rgba(248,200,212,.15)';pvctx.lineWidth=1;pvctx.beginPath();pvctx.moveTo(15,170);pvctx.lineTo(115,170);pvctx.stroke();
  const sc=4,w=22*sc,h=22*sc,px=130/2-w/2,py=168-h-4*sc;
  // Draw 2D character at scale 4 (reusing 2D drawChar logic inline)
  draw2DChar(pvctx,px,py,sc);
}
function draw2DChar(c,px,py,sc){
  const w=22*sc,h=22*sc;
  if(P.backpack){c.fillStyle='#E34234';c.fillRect(px-4*sc,py+8*sc,8*sc,14*sc);}
  if(P.scarf){c.fillStyle='#C9B1FF';c.fillRect(px+2*sc,py+12*sc,w-4*sc,6*sc);}
  c.fillStyle=P.bc;c.fillRect(px,py+h-12*sc,w/2-1,12*sc);c.fillRect(px+w/2+1,py+h-12*sc,w/2-1,12*sc);
  c.fillStyle='#333';c.fillRect(px-1,py+h,w/2+1,4*sc);c.fillRect(px+w/2,py+h,w/2+1,4*sc);
  c.fillStyle=P.tc;c.fillRect(px,py+8*sc,w,h-8*sc);
  c.fillStyle=P.sk;c.fillRect(px-3*sc,py+9*sc,3*sc,12*sc);c.fillRect(px+w,py+9*sc,3*sc,12*sc);
  c.fillStyle=P.sk;c.beginPath();c.roundRect(px+sc,py,w-2*sc,14*sc,7);c.fill();
  if(P.hs!=='none'){c.fillStyle=P.hc;if(P.hs==='afro'){c.beginPath();c.ellipse(px+w/2,py-2*sc,w/2+4*sc,10*sc,0,0,Math.PI*2);c.fill();}else if(P.hs==='long'){c.fillRect(px,py-2*sc,w,7*sc);c.fillRect(px,py+4*sc,3*sc,16*sc);c.fillRect(px+w-3*sc,py+4*sc,3*sc,16*sc);}else if(P.hs==='bun'){c.fillRect(px,py-2*sc,w,7*sc);c.beginPath();c.arc(px+w/2,py-3*sc,5*sc,0,Math.PI*2);c.fill();}else if(P.hs==='spiky'){for(let i=0;i<5;i++){c.beginPath();c.moveTo(px+4*sc+i*3.5*sc,py);c.lineTo(px+2*sc+i*3.5*sc,py-7*sc);c.lineTo(px+6*sc+i*3.5*sc,py);c.fill();}}else{c.fillRect(px,py-2*sc,w,7*sc);}}
  c.fillStyle=P.ey;c.fillRect(px+4*sc,py+5*sc,3*sc,3*sc);c.fillRect(px+w-7*sc,py+5*sc,3*sc,3*sc);
  if(P.glasses){c.strokeStyle='rgba(0,0,0,.7)';c.lineWidth=1.5;c.strokeRect(px+2*sc,py+4*sc,6*sc,5*sc);c.strokeRect(px+w-8*sc,py+4*sc,6*sc,5*sc);}
  if(P.badge){c.fillStyle='#F4D03F';c.beginPath();c.arc(px+w-4*sc,py+14*sc,3*sc,0,Math.PI*2);c.fill();}
  if(P.hat!=='none'){c.fillStyle=P.htc;if(P.hat==='cap'){c.fillRect(px-sc,py-4*sc,w+2*sc,5*sc);c.fillRect(px+w/2,py-5*sc,w/2+3*sc,3*sc);}else if(P.hat==='beanie'){c.fillRect(px,py-7*sc,w,8*sc);}else if(P.hat==='crown'){c.fillStyle='#F4D03F';for(let i=0;i<3;i++){c.beginPath();c.moveTo(px+3*sc+i*6*sc,py-2*sc);c.lineTo(px+6*sc+i*6*sc,py-9*sc);c.lineTo(px+9*sc+i*6*sc,py-2*sc);c.fill();}c.fillRect(px+2*sc,py-4*sc,w-4*sc,4*sc);}else if(P.hat==='chef'){c.fillStyle='#fff';c.fillRect(px+sc,py-4*sc,w-2*sc,4*sc);c.beginPath();c.ellipse(px+w/2,py-6*sc,w/2-2*sc,5*sc,0,0,Math.PI*2);c.fill();}else if(P.hat==='cowboy'){c.fillRect(px-2*sc,py-3*sc,w+4*sc,3*sc);c.fillRect(px+2*sc,py-9*sc,w-4*sc,7*sc);}else if(P.hat==='party'){c.beginPath();c.moveTo(px+w/2,py-14*sc);c.lineTo(px+2*sc,py-2*sc);c.lineTo(px+w-2*sc,py-2*sc);c.fill();}}
  c.fillStyle='rgba(0,0,0,.55)';c.font=`bold ${10*sc}px Segoe UI`;c.textAlign='center';c.textBaseline='alphabetic';
  const tw=c.measureText(P.nm).width+10*sc;c.fillRect(px+w/2-tw/2,py-18*sc,tw,12*sc);c.fillStyle='#fff';c.fillText(P.nm,px+w/2,py-8*sc);
}

  for(const car of cars3d){if(!car.occupied&&pp.distanceTo(new THREE.Vector3(car.group.position.x,0,car.group.position.z))<4){enterCar3d(car);return;}}
  for(const b of buildingDefs){if(pp.distanceTo(new THREE.Vector3(b.x,0,b.z))<10){showLocationPopup('Entered '+b.label);return;}}
}
function enterCar3d(car){
  car.occupied=true;playerCar=car;
  document.getElementById('vhud').style.display='block';
  playerContainer.position.set(car.group.position.x,0,car.group.position.z);
}
function exitCar3d(){
  if(!playerCar)return;
  playerCar.occupied=false;
  playerContainer.position.set(playerCar.group.position.x+3,0,playerCar.group.position.z);
  playerCar=null;
  document.getElementById('vhud').style.display='none';
}
function showLocationPopup(t){const el=document.getElementById('location-popup');el.textContent=t;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2000);}

// ── Sword swing effect ─────────────────────────────────────────
const swingGroup=new THREE.Group();
scene.add(swingGroup);
const bladeMat=new THREE.MeshStandardMaterial({color:0x88aaff,emissive:0x4466ff,emissiveIntensity:1.5,transparent:true,opacity:0.85});
const blade=new THREE.Mesh(new THREE.BoxGeometry(0.08,1.8,0.08),bladeMat);
blade.position.y=0.9; swingGroup.add(blade);
const guardMat=new THREE.MeshStandardMaterial({color:0xddaa00,emissive:0x886600,emissiveIntensity:0.8});
const guard=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.12,0.12),guardMat);
swingGroup.add(guard);
swingGroup.visible=false;

// ── Collision ──────────────────────────────────────────────────
function checkBuildingCollision(nx,nz){
  for(const b of buildingDefs){
    const hw=b.w/2+0.8,hd=b.d/2+0.8;
    if(Math.abs(nx-b.x)<hw&&Math.abs(nz-b.z)<hd)return true;
  }
  if(Math.abs(nx)>95||Math.abs(nz)>95)return true;
  return false;
}

// ── Minimap ────────────────────────────────────────────────────
const mmCanvas=document.getElementById('mm');const mmCtx=mmCanvas.getContext('2d');
function drawMinimap(){
  const S=130/200,OFF=65;
  mmCtx.fillStyle='#5a8a5a';mmCtx.fillRect(0,0,130,100);
  mmCtx.fillStyle='#888';
  [[0,0,200,8],[0,-40,200,8],[0,40,200,8],[-30,0,8,200],[30,0,8,200],[70,0,8,200],[-70,0,8,200]].forEach(([x,z,w,d])=>{
    mmCtx.fillRect((x-w/2+OFF)*S,(z-d/2+50)*S,w*S,d*S);
  });
  buildingDefs.forEach(b=>{mmCtx.fillStyle='rgba(248,200,212,0.5)';mmCtx.fillRect((b.x-b.w/2+OFF)*S,(b.z-b.d/2+50)*S,b.w*S,b.d*S);});
  npcs3d.forEach(n=>{mmCtx.fillStyle='#f9e05e';mmCtx.fillRect((n.group.position.x+OFF)*S-2,(n.group.position.z+50)*S-2,4,4);});
  const pp=playerContainer.position;
  mmCtx.fillStyle='#fff';mmCtx.beginPath();mmCtx.arc((pp.x+OFF)*S,(pp.z+50)*S,4,0,Math.PI*2);mmCtx.fill();
  // View cone
  mmCtx.strokeStyle='rgba(255,255,255,0.3)';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.arc((pp.x+OFF)*S,(pp.z+50)*S,12,camAngle-0.4,camAngle+0.4);mmCtx.stroke();
}

// ── Day/Night cycle ────────────────────────────────────────────
const SKY_DAY=new THREE.Color(0x87CEEB);
const SKY_SUNSET=new THREE.Color(0xFF8C42);
const SKY_NIGHT=new THREE.Color(0x0a0a1f);
function updateDayNight(t){
  // t: 0=midnight, 0.5=noon, 1=midnight
  let skyCol,sunInt,ambInt,sunCol;
  if(t<0.2||t>0.8){ // night
    const n=t<0.2?1-t/0.2:(t-0.8)/0.2;
    skyCol=SKY_NIGHT.clone(); sunInt=0; ambInt=0.12; sunCol=new THREE.Color(0x3050a0);
    moon.intensity=0.4*n; ambient.color.setHex(0x202060);
    streetLights.forEach(sl=>{sl.pt.intensity=1.5*n;sl.bulbMat.emissiveIntensity=n;});
  }else if(t<0.3||t>0.7){ // dawn/dusk
    const s=t<0.3?(t-0.2)/0.1:(0.8-t)/0.1;
    skyCol=SKY_SUNSET.clone().lerp(SKY_DAY,s); sunInt=0.6+0.8*s; ambInt=0.3+0.2*s;
    sunCol=new THREE.Color(0xff8855).lerp(new THREE.Color(0xfff5e0),s);
    moon.intensity=0; ambient.color.setHex(0x7080a0);
    streetLights.forEach(sl=>{sl.pt.intensity=0;sl.bulbMat.emissiveIntensity=0;});
  }else{ // day
    skyCol=SKY_DAY.clone(); sunInt=1.4; ambInt=0.5; sunCol=new THREE.Color(0xfff5e0);
    moon.intensity=0; ambient.color.setHex(0x8090b0);
    streetLights.forEach(sl=>{sl.pt.intensity=0;sl.bulbMat.emissiveIntensity=0;});
  }
  scene.background.copy(skyCol);
  scene.fog.color.copy(skyCol);
  sun.intensity=sunInt; sun.color.copy(sunCol); ambient.intensity=ambInt;
  // Car headlights at night
  const night=(t<0.25||t>0.75);
  cars3d.forEach(car=>{car.hlMat.forEach(m=>m.emissiveIntensity=night?1.5:0);});
  // Time string
  const h24=Math.floor(t*24),min=Math.floor((t*24*60)%60),ampm=h24>=12?'PM':'AM',h12=(h24%12)||12;
  document.getElementById('tstr').textContent=`${h12}:${min.toString().padStart(2,'0')} ${ampm}`;
}

// ── NPC update ─────────────────────────────────────────────────
function updateNPCs(){
  for(const n of npcs3d){
    n.timer--;
    if(n.timer<=0){const a=Math.random()*Math.PI*2;n.vx=Math.cos(a)*0.04;n.vz=Math.sin(a)*0.04;n.timer=80+Math.random()*120;}
    const nx=n.group.position.x+n.vx,nz=n.group.position.z+n.vz;
    if(!checkBuildingCollision(nx,nz)){n.group.position.x=nx;n.group.position.z=nz;}
    else{n.vx*=-1;n.vz*=-1;n.timer=20;}
    // Face movement direction
    if(Math.abs(n.vx)>0.001||Math.abs(n.vz)>0.001)n.group.rotation.y=Math.atan2(n.vx,n.vz);
    // NPCs always face camera (sprites)
  }
}

// ── Ferris wheel animation ─────────────────────────────────────
let fwAngle=0;

// ── Main animation loop ────────────────────────────────────────
const clock=new THREE.Clock();
let walkT=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  // Day/night
  dayTime=(dayTime+DAY_SPD)%1;
  updateDayNight(dayTime);

  // Money
  moneyT+=dt;
  if(moneyT>60){money+=50;moneyT=0;document.getElementById('money').textContent=money;}

  // Ferris wheel spin
  fwAngle+=dt*0.3;
  ferrisWheel.rotation.y=fwAngle*0.1;
  // Rotate gondolas (children at index >8 are gondolas)
  ferrisWheel.children.forEach((c,i)=>{if(i>=2&&i<10){const a=fwAngle+i*Math.PI/4;c.position.x=Math.cos(a)*5;c.position.y=6+Math.sin(a)*5;}});

  // Movement
  const SPD=playerCar?0.18:0.08;
  let moved=false;
  if(!chatOpen&&!wOpen){
    const fwd=new THREE.Vector3(-Math.sin(camAngle),0,-Math.cos(camAngle));
    const right=new THREE.Vector3(-Math.cos(camAngle),0,Math.sin(camAngle));
    let mv=new THREE.Vector3();
    if(keys['arrowup']||keys['w'])mv.add(fwd);
    if(keys['arrowdown']||keys['s'])mv.sub(fwd);
    if(keys['arrowleft']||keys['a'])mv.sub(right);
    if(keys['arrowright']||keys['d'])mv.add(right);
    if(mv.lengthSq()>0){
      mv.normalize().multiplyScalar(SPD);
      const pp=playerContainer.position;
      const nx=pp.x+mv.x,nz=pp.z+mv.z;
      if(playerCar){
        if(!checkBuildingCollision(nx,nz)){playerContainer.position.set(nx,0,nz);playerCar.group.position.set(nx,0,nz);}
      }else{
        if(!checkBuildingCollision(nx,pp.z))pp.x=nx;
        if(!checkBuildingCollision(pp.x,nz))pp.z=nz;
      }
      // Face direction of movement
      playerContainer.rotation.y=Math.atan2(mv.x,mv.z);
      moved=true;
      walkT+=dt*8;
    }
  }

  // Walk animation
  if(moved&&playerMesh.userData.la){
    const swing=Math.sin(walkT)*0.4;
    playerMesh.userData.la.rotation.x=swing;
    playerMesh.userData.ra.rotation.x=-swing;
    playerMesh.userData.ll.rotation.x=-swing;
    playerMesh.userData.rl.rotation.x=swing;
    // Bob
    playerContainer.position.y=Math.abs(Math.sin(walkT))*0.06;
  }else{
    if(playerMesh.userData.la){['la','ra','ll','rl'].forEach(k=>{if(playerMesh.userData[k])playerMesh.userData[k].rotation.x*=0.8;});}
    playerContainer.position.y*=0.8;
  }

  // Sword swing
  if(swingFrame>0){
    swingGroup.visible=true;
    swingGroup.position.copy(playerContainer.position);
    swingGroup.position.y+=1.0;
    const progress=1-swingFrame/30;
    swingGroup.rotation.y=playerContainer.rotation.y+(-0.8+progress*1.6)*Math.PI;
    swingGroup.rotation.z=(-0.3+progress*0.6)*Math.PI;
    bladeMat.opacity=swingFrame/30*0.9;
    swingFrame--;
  }else swingGroup.visible=false;

  // Camera follow
  const pp=playerContainer.position;
  const camDist=12,camH=6+camPitch*8;
  const targetCam=new THREE.Vector3(
    pp.x+Math.sin(camAngle)*camDist,
    pp.y+camH,
    pp.z+Math.cos(camAngle)*camDist
  );
  camera.position.lerp(targetCam,0.1);
  camera.lookAt(pp.x,pp.y+1.2,pp.z);

  // NPC update
  updateNPCs();

  // Near prompt
  let prompt='';
  if(!playerCar){
    for(const car of cars3d){if(!car.occupied&&pp.distanceTo(new THREE.Vector3(car.group.position.x,0,car.group.position.z))<4){prompt=`E → Drive ${car.lb}`;break;}}
    if(!prompt){for(const b of buildingDefs){if(pp.distanceTo(new THREE.Vector3(b.x,0,b.z))<10){prompt=`E → Enter ${b.label}`;break;}}}
  }else prompt='Space → Exit Car';
  const pel=document.getElementById('prompt');
  if(prompt!==nearPrompt){nearPrompt=prompt;pel.textContent=prompt;pel.style.opacity=prompt?'1':'0';}

  // Location name
  let locName='Town Square';
  for(const b of buildingDefs){if(pp.distanceTo(new THREE.Vector3(b.x,0,b.z))<16){locName=b.label.split(' ').slice(1).join(' ')||b.label;break;}}
  document.getElementById('loc-name').textContent=locName;

  drawMinimap();
  renderer.render(scene,camera);
}

setLoad(100);
setTimeout(()=>{hideLoad();animate();},800);
</script>
